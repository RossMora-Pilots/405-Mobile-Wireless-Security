name: PM Evidence

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      enable_sync:
        description: 'Enable Issues sync (uses GITHUB_TOKEN)'
        required: false
        default: 'false'

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Parse roadmap (basic check)
        run: |
          test -f ROADMAP.md && echo "ROADMAP.md exists"
          grep -c "^- \[" ROADMAP.md || true
